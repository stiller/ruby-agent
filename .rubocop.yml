AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false

# Internal classes in a small CLI don't need API docs.
Style/Documentation:
  Enabled: false

# The traversal/validation methods are naturally verbose; 25 is more realistic.
Metrics/MethodLength:
  Max: 25

# Register blocks count as many branches; 52 keeps the meaningful outliers visible.
Metrics/AbcSize:
  Max: 52

# Find traversal needs multiple guards; 10 is a sensible ceiling.
Metrics/CyclomaticComplexity:
  Max: 10

# Test classes with one case per behaviour legitimately run long.
Metrics/ClassLength:
  Max: 180

# Runner module consolidates all CLI wiring in one place.
Metrics/ModuleLength:
  Max: 255

# AgentLoop and build_loop have many meaningful named parameters.
Metrics/ParameterLists:
  Max: 9

# History-accumulation test has multiple role/content assertions.
Metrics/PerceivedComplexity:
  Max: 9
