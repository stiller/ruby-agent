# Read-write override: promotes /workspace to writable so the agent can apply patches.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.rw.yml run --rm ragent "fix the bug"
#
# In this mode run artifacts are written to <workspace>/.ragent/runs/ as normal.
# Only use this when you trust the prompt and have reviewed the target repository.
services:
  ragent:
    volumes:
      - .:/app:ro
      - ${WORKSPACE_PATH:-./workspace}:/workspace
